<!doctype html>
<html lang="en">
  <head>
    <!-- Charset -->
    <meta charset="UTF-8" />

    <!-- Viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Title -->
    <title>Humam QSM | Quality Management System</title>

    <!-- SEO -->
    <meta name="description" content="Humam QSM is a powerful Quality Management System designed to streamline inspections, reporting, and operational excellence." />
    <meta name="keywords" content="QSM, Quality Management, Inspections, Reports, Dashboard, Saudi Arabia" />
    <meta name="author" content="Humam" />

    <!-- Theme -->
    <meta name="theme-color" content="#0f172a" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/Humam-Logo.svg" />
    <link rel="apple-touch-icon" href="/Humam-Logo.svg" />
    
    <!-- Preload LCP image for hero section (critical for performance) -->
    <link rel="preload" as="image" href="/dashboard-light.webp" media="(prefers-color-scheme: light)" fetchpriority="high" />
    <link rel="preload" as="image" href="/dashboard-dark.webp" media="(prefers-color-scheme: dark)" fetchpriority="high" />

    <!-- Open Graph (Social Sharing) -->
    <meta property="og:title" content="Humam QSM" />
    <meta property="og:description" content="Manage inspections, reports, and quality operations efficiently." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/Humam-Logo.svg" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Humam QSM" />
    <meta name="twitter:description" content="Advanced Quality Management System for modern operations." />
    <meta name="twitter:image" content="/Humam-Logo.svg" />

    <!-- Preconnect to font origins (DNS + TLS handshake optimization) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <!-- Load fonts asynchronously to prevent render blocking -->
    <link
      rel="preload"
      as="style"
      onload="this.onload=null;this.rel='stylesheet'"
      href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700&family=Tajawal:wght@300;400;500;700;800&display=swap"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700&family=Tajawal:wght@300;400;500;700;800&display=swap"
        rel="stylesheet"
      />
    </noscript>

    <!-- Prevent FOUC (Flash of unstyled content) -->
    <style>
      html {
        font-family: 'Rubik', system-ui, -apple-system, sans-serif;
        background-color: #0b1220;
      }
      body {
        margin: 0;
      }
    </style>
  </head>

  <body>
    <!-- Root App -->
    <div id="root"></div>

    <!-- No JS fallback -->
    <noscript>
      <div style="padding: 20px; text-align: center; font-family: sans-serif;">
        This application requires JavaScript to run. Please enable JavaScript in your browser.
      </div>
    </noscript>

    <!-- App Entry -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
